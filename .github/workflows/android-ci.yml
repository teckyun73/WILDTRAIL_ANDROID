name: Android CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: android-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Unit tests and debug build
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Run JVM tests and assemble debug artifacts
        run: ./gradlew testDebugUnitTest assembleDebug assembleDebugAndroidTest --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: wildtrail-debug-apk
          path: |
            app/build/outputs/apk/debug/app-debug.apk
            app/build/outputs/apk/debug/output-metadata.json
          if-no-files-found: error
          retention-days: 14

      - name: Upload Android test APK
        uses: actions/upload-artifact@v4
        with:
          name: wildtrail-debug-android-test-apk
          path: app/build/outputs/apk/androidTest/debug/*.apk
          if-no-files-found: error
          retention-days: 14

      - name: Upload JVM test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wildtrail-jvm-test-report
          path: app/build/reports/tests/testDebugUnitTest
          if-no-files-found: warn
          retention-days: 14
